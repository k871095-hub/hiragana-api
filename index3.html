<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もじ・すうじ れんしゅうあぷり</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Klee One', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f7f9fa;
            text-align: center;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 10px; }

        /* タブメニューのスタイル */
        .tab-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        .tab-button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #ccc;
            background-color: #fff;
            border-radius: 25px;
            transition: all 0.3s;
        }
        .tab-button.active {
            background-color: #ff7f50;
            color: white;
            border-color: #ff7f50;
        }

        /* コンテンツエリア */
        .tab-content {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tab-content.active { display: block; }

        /* 文字選択ボタンのレイアウト */
        .char-section {
            margin-bottom: 20px;
            text-align: left;
        }
        .char-section h3 {
            margin: 5px 0;
            color: #555;
            border-left: 4px solid #ff7f50;
            padding-left: 8px;
            font-size: 16px;
        }
        .char-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .char-btn {
            width: 45px;
            height: 45px;
            font-size: 20px;
            font-family: 'Klee One', sans-serif;
            font-weight: bold;
            background: #f0f4f8;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            cursor: pointer;
        }
        .char-btn:hover { background: #e2e8f0; }

        /* 練習エリア（漢字アプリを踏襲する部分） */
        #practice-area {
            margin-top: 25px;
            display: none;
        }
        .canvas-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
            border: 3px solid #333;
            background: #fff;
        }
        /* なぞり書き用のお手本（背景に薄く表示） */
        #bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            color: rgba(0, 0, 0, 0.08); /* 薄いグレー */
            pointer-events: none;
            font-family: 'Klee One', sans-serif;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .controls { margin-top: 15px; }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 0 5px;
        }
        .btn-clear { background: #e53e3e; color: white; }
        .btn-back { background: #718096; color: white; }
    </style>
</head>
<body>

    <h1>✏️ もじ・すうじ れんしゅう</h1>

    <!-- タブボタン -->
    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab('hiragana')">ひらがな</button>
        <button class="tab-button" onclick="switchTab('katakana')">カタカナ</button>
        <button class="tab-button" onclick="switchTab('suuji')">すうじ</button>
    </div>

    <!-- ひらがなタブ -->
    <div id="hiragana" class="tab-content active">
        <div class="char-section">
            <h3>せいおん（あ〜わ）</h3>
            <div class="char-grid" id="h-seion"></div>
        </div>
        <div class="char-section">
            <h3>だくおん・はんだくおん（が・ぱ〜）</h3>
            <div class="char-grid" id="h-dakuon"></div>
        </div>
    </div>

    <!-- カタカナタブ -->
    <div id="katakana" class="tab-content">
        <div class="char-section">
            <h3>セイオン（ア〜ワ）</h3>
            <div class="char-grid" id="k-seion"></div>
        </div>
        <div class="char-section">
            <h3>ダクオン・ハンダクオン（ガ・パ〜）</h3>
            <div class="char-grid" id="k-dakuon"></div>
        </div>
    </div>

    <!-- すうじタブ -->
    <div id="suuji" class="tab-content">
        <div class="char-section">
            <h3>かず（1 〜 9）</h3>
            <div class="char-grid" id="s-numbers"></div>
        </div>
    </div>

    <!-- 練習エリア（文字選択後に表示） -->
    <div id="practice-area">
        <h2 id="current-char-title">「あ」のれんしゅう</h2>
        <div class="canvas-container">
            <div id="bg-text">あ</div>
            <canvas id="paint-canvas" width="300" height="300"></canvas>
        </div>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearCanvas()">ぜんぶ消す</button>
            <button class="btn btn-back" onclick="backToSelect()">もどる</button>
        </div>
    </div>

    <script>
        // データ定義
        const data = {
            hiragana: {
                seion: "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん".split(""),
                dakuon: "がぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽ".split("")
            },
            katakana: {
                seion: "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン".split(""),
                dakuon: "ガギグゲゴザジズゼゾダヂヅデドバビブベボパピプペポ".split("")
            },
            suuji: ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
        };

        // ボタンの動的生成
        function createButtons() {
            const createGrid = (id, chars) => {
                const grid = document.getElementById(id);
                chars.forEach(c => {
                    const btn = document.createElement("button");
                    btn.className = "char-btn";
                    btn.innerText = c;
                    btn.onclick = () => startPractice(c);
                    grid.appendChild(btn);
                });
            };

            createGrid("h-seion", data.hiragana.seion);
            createGrid("h-dakuon", data.hiragana.dakuon);
            createGrid("k-seion", data.katakana.seion);
            createGrid("k-dakuon", data.katakana.dakuon);
            createGrid("s-numbers", data.suuji);
        }

        // タブ切り替え
        function switchTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // クリックされたタブをアクティブに
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            // 練習中なら選択画面に戻す
            backToSelect();
        }

        // 練習開始
        function startPractice(char) {
            document.getElementById("current-char-title").innerText = `「${char}」のれんしゅう`;
            document.getElementById("bg-text").innerText = char;
            document.getElementById("practice-area").style.display = "block";
            clearCanvas();
        }

        function backToSelect() {
            document.getElementById("practice-area").style.display = "none";
        }

        // --- キャンバスのお絵かき処理（漢字アプリのロジックをここに統合） ---
        const canvas = document.getElementById("paint-canvas");
        const ctx = canvas.getContext("2d");
        let drawing = false;

        // 簡易的な描画ロジック（マウス・タッチ対応）
        function setupCanvas() {
            ctx.lineWidth = 12;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#333";

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { drawing = true; draw(e); };
            const end = () => { drawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if (!drawing) return;
                e.preventDefault();
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };

            canvas.addEventListener("mousedown", start);
            canvas.addEventListener("mouseup", end);
            canvas.addEventListener("mousemove", draw);
            canvas.addEventListener("touchstart", start);
            canvas.addEventListener("touchend", end);
            canvas.addEventListener("touchmove", draw);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 初期化
        createButtons();
        setupCanvas();
    </script>
</body>
</html>
